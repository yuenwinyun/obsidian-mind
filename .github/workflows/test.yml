name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
      - '.codex/**'
      - 'AGENTS.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'scripts/**'
      - 'vault-manifest.json'
  pull_request:
    paths:
      - '.claude/scripts/**'
      - '.codex/**'
      - 'AGENTS.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'scripts/**'
      - 'vault-manifest.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run hook tests
        run: python .claude/scripts/test_hooks.py -v
      - name: Run Codex E2E tests
        run: python scripts/test_codex_e2e.py -v
      - name: Validate template metadata
        run: python scripts/validate_template_metadata.py
