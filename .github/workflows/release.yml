name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          python3 .claude/scripts/test_hooks.py
          python3 scripts/test_codex_e2e.py
          python3 scripts/test_release_artifact.py

      - name: Validate template metadata
        run: python3 scripts/validate_template_metadata.py

      - name: Build vault zip
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ZIP_PATH="$(python3 scripts/build_release_zip.py --version "$VERSION" --output-dir .)"
          ZIP_NAME="$(basename "$ZIP_PATH")"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create or update release
        run: |
          if gh release view "$VERSION" &>/dev/null; then
            gh release upload "$VERSION" "$ZIP_NAME" --clobber
          else
            gh release create "$VERSION" "$ZIP_NAME" \
              --title "$VERSION" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
